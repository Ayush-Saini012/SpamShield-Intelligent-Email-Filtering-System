  <title>Email Spam Detector</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Email Spam Detector</h1>
  </header>

  <main class="container">
    <section>
      <label for="emailText">Paste your email message below:</label>
      <textarea id="emailText" placeholder="Paste your email message here..." rows="10"></textarea>
    </section>

    <section>
      <button id="checkBtn" onclick="checkSpam()" aria-label="Check if email is spam">
        🔍 Check Email
      </button>
    </section>

    <section>
      <h2 id="result"></h2>
      <p id="details"></p> <!-- optional: show why it's spam -->
    </section>
  </main>

  <footer>
    <p>© 2026 Email Spam Detector | Built for learning</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
